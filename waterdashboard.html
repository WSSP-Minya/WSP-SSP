<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Water Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="waterdash.css">

</head>

<body>

<h2 style="text-align:center;">Water Monitoring Dashboard</h2>

<div class="dashboard-grid">
  <canvas id="turbidityChart"></canvas>
  <canvas id="phChart"></canvas>
  <canvas id="tempChart"></canvas>
  <canvas id="tdsChart"></canvas>
  <canvas id="chChart"></canvas>
  <canvas id="sulfChart"></canvas>
  <canvas id="feChart"></canvas>
  <canvas id="mnChart"></canvas>
  <canvas id="nh3Chart"></canvas>
  <canvas id="no2Chart"></canvas>
  <canvas id="no3Chart"></canvas>
  <canvas id="doChart"></canvas>
  <canvas id="codChart"></canvas>
  <canvas id="bodChart"></canvas>
  <canvas id="ogChart"></canvas>
  <canvas id="tcChart"></canvas>
  <canvas id="taChart"></canvas>
  
</div>



</body>
</html>
<script>
// =========================
// GLOBAL STORAGE
// =========================
let charts = {};
let waterData = [];  // يجب تحميلها من المصدر
const monthlyStats = {};
const surveyPointsOrder = [
  "اعلى التيار 3000 م",
  "اعلى التيار 2500 م",
  "اعلى التيار 2000 م",
  "اعلى التيار 1500 م",
  "اعلى التيار 1000 م",
  "اعلى التيار 500 م",
  "المأخذ",
  "اسفل التيار 500 م",
  "اسفل التيار 1000 م"
];
  
// =========================
// LOAD DATA (EXAMPLE)
// =========================
async function loadWaterData() {

  const email = sessionStorage.getItem("email");
  const department = sessionStorage.getItem("department");

  if (!email || !department) {
    alert("Session expired, please login again");
    window.location.href = "index.html";
    return;
  }

  const url = `https://script.google.com/macros/s/AKfycbzxkrJQQ6mArsWsFhpMtG19zpUXHudAg9nGR-wO4Tf_8XrzVdiD_68dEdkXYksUJHfY_A/exec?action=getData&email=${encodeURIComponent(email)}&department=${encodeURIComponent(department)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    console.log("DATA:", data);

    if (data.status === "success") {
      waterData = data.water_data; // مهم جدًا
      generateDashboard(); // تشغيل الداشبورد بعد تحميل البيانات
    } else {
      alert("Unauthorized or invalid request");
    }

  } catch (err) {
    console.error(err);
    alert("فشل الاتصال بالبيانات");
  }
}
// =========================
// FILTER DATA
// =========================
function getFilteredData() {
  const { branch, station, from, to, type } = window.dashboardFilters;

  let fromDate = from ? new Date(from) : null;
  let toDate = to ? new Date(to) : null;
  if (toDate) toDate.setHours(23,59,59,999);

  return waterData.filter(r => {
    const d = new Date(r[1]);
    const b = r[2];
    const s = r[3];
    const point = r[4];

    // 👇 هنا الحل
    

    if (branch && b !== branch) return false;
    if (station && s !== station) return false;
    if (fromDate && d < fromDate) return false;
    if (toDate && d > toDate) return false;

    return true;
  });
}
// =========================
// MONTHLY PROCESSING
// =========================
function resetMonthly() { Object.keys(monthlyStats).forEach(k => delete monthlyStats[k]); }
function monthKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function push(ind, date, val) {
  if(val==="" || val==null) return;
  const v = Number(val);
  if(isNaN(v)) return;
  const m = monthKey(date);
  if(!monthlyStats[ind]) monthlyStats[ind] = {};
  if(!monthlyStats[ind][m]) monthlyStats[ind][m] = [];
  monthlyStats[ind][m].push(v);
}
function build(ind) {
  const data = monthlyStats[ind] || {};
  const labels = Object.keys(data).sort();
  const values = labels.map(m => {
    const arr = data[m];
    return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2);
  });
  return { labels, values };
}

// =========================
// SURVEY PROCESSING
// =========================
function normalize(str){
  return (str || "")
    .toString()
    .trim()
    .replace(/\s+/g,' ')
    .replace(/\u200f|\u200e/g,''); // removes hidden RTL/LTR marks
}

// =========================
// BUILD GROUPS ONCE
// =========================
  function buildSurveyMap(data) {

  const map = {};
  const normalizedPoints = surveyPointsOrder.map(normalize);

  // تجميع أولي حسب:
  // التاريخ + الفرع + المحطة
  const grouped = {};

  data.forEach(r => {

    const date = r[1];
    const branch = r[2];
    const station = r[3];

    const point = normalize(r[4]);

    const idx = normalizedPoints.indexOf(point);

    if (idx === -1) return;

    const key = `${date}|${branch}|${station}`;

    if (!grouped[key]) {
      grouped[key] = [];
    }

    grouped[key].push(r);

  });

  // نحتفظ فقط بالمجموعات التى بها أكثر من نقطة
  Object.values(grouped).forEach(group => {

    const uniquePoints = [
      ...new Set(group.map(r => normalize(r[4])))
    ];

    // استبعاد المأخذ فقط
    if (uniquePoints.length <= 1) return;

    group.forEach(r => {

      const point = normalize(r[4]);

      const idx = normalizedPoints.indexOf(point);

      if (idx === -1) return;

      const pointName = surveyPointsOrder[idx];

      const surveyId = `${r[1]} - ${r[3]}`;

      if (!map[pointName]) {
        map[pointName] = {};
      }

      if (!map[pointName][surveyId]) {
        map[pointName][surveyId] = [];
      }

      map[pointName][surveyId].push(r);

    });

  });

  return map;
}

// =========================
// BUILD SERIES
// =========================
function buildSurveySeries(groupedMap, index) {

  const datasets = [];

  Object.keys(groupedMap).forEach(point => {

    const surveys = groupedMap[point];

    Object.keys(surveys).forEach(date => {

      const rows = surveys[date];

      const values = rows
        .map(r => Number(r[index]))
        .filter(v => !isNaN(v));

      if (!values.length) return;

      const avg = values.reduce((a,b)=>a+b,0) / values.length;

      let ds = datasets.find(d => d.label === date);

      if (!ds) {
        ds = {
          label: date,
          data: new Array(surveyPointsOrder.length).fill(null)
        };
        datasets.push(ds);
      }

      const idx = surveyPointsOrder.indexOf(point);

      if (idx !== -1) {
        ds.data[idx] = isNaN(avg) ? null : +avg.toFixed(2);
      }
    });
  });

  return datasets;
}
  //============
  //الحدود
  //============
const limits = {
  pH_min: 6.5,  pH_max: 8.5,
  tds_max: 500,
  sulf_max: 200,
  fe_max: 0.5,
  mn_max: 0.2,
  nh3_max: 0.5,
  no3_max: 2,
  do_min: 6,
  cod_max: 10,
  bod_max: 6,
  og_max: 0.1
};
  

// =========================
// DRAW CHART
// =========================
function draw(id, label, data, color, param) {

  const canvas = document.getElementById(id);
  if (!canvas) return;

  const ctx = canvas.getContext("2d");

  if (charts[id]) charts[id].destroy();

  const isMulti = Array.isArray(data) && data[0]?.data;
  const chartMeta = {
    turbidity: { title: "Turbidity", unit: "NTU" },
    pH: { title: "pH", unit: "" },
    temp: { title: "Temperature", unit: "°C" },
    tds: { title: "TDS", unit: "mg/L" },
    ch: { title: "Chlorides", unit: "mg/L" },
    sulf: { title: "Sulfates", unit: "mg/L" },
    fe: { title: "Fe", unit: "mg/L" },
    mn: { title: "Mn", unit: "mg/L" },
    nh3: { title: "NH3", unit: "mg/L" },
    no2: { title: "NO2", unit: "mg/L" },
    no3: { title: "NO3", unit: "mg/L" },
    do: { title: "DO", unit: "mg/L" },
    cod: { title: "COD", unit: "mg/L" },  
    bod: { title: "BOD", unit: "mg/L" },
    og: { title: "Oil & Grease", unit: "mg/L" },
    tc: { title: "Total Coliform", unit: "C.F.U/100 ml" },
    ta: { title: "Total Algae", unit: "Colony/ml" }
  };

  // =========================
  // MULTI SURVEY MODE
  // =========================
  if (isMulti) {

  // تنظيف أي datasets فاضية
  const cleanDatasets = data.filter(d =>
    d.data && d.data.some(v => v !== null)
  );
   const limitLines = [];

  const minKey = param + "_min";
  const maxKey = param + "_max";
  
  if (limits[minKey] !== undefined) {
    limitLines.push({
      label: param + " Min",
      data: new Array(surveyPointsOrder.length).fill(limits[minKey]),
      borderColor: "red",
      borderWidth: 3,
      borderDash: [6,6],
      pointRadius: 0,
      fill: false
    });
  }
  
  if (limits[maxKey] !== undefined) {
    limitLines.push({
      label: param + " Max",
      data: new Array(surveyPointsOrder.length).fill(limits[maxKey]),
      borderColor: "red",
      borderWidth: 3,
      borderDash: [6,6],
      pointRadius: 0,
      fill: false
    });
  }

  charts[id] = new Chart(ctx, {
    type: "line",
    data: {
      labels: surveyPointsOrder,
      datasets:[
        ...cleanDatasets.map((ds, i) => ({
        label: ds.label,
        data: ds.data,
        borderColor: getColorByIndex(i),
        tension: 0.3,
        fill: false,
        borderWidth: 4,
        pointRadius: (ctx) => {
          return ctx.raw == null ? 0 : 5;
        },
      
        pointHoverRadius: (ctx) => {
          return ctx.raw == null ? 0 : 6;
        },
        pointHitRadius: (ctx) => {
          return ctx.raw == null ? 0 : 10;
        },
        showLine: true,
        spanGaps: false
      })),
            ...limitLines
                ]
    },

    options: {
      responsive: true,
      maintainAspectRatio: false,

      plugins: {
        title: {
          display: true,
          text: chartMeta[param]?.title || label,
          font: { size: 18, weight: "bold" },
          color: "#000"
        },

        legend: {
          labels: {
            color: "#000",
            font: { size: 14, weight: "bold" }
          }
        }
      },

      scales: {
        x: {
          ticks: {
            color: '#000',
            font: {
              size: 14,
              weight: 'bold'
            }
          }
        },

        y: {
          title: {
            display: true,
            text: chartMeta[param]?.unit || "",
            font: {
              size: 14,
              weight: "bold"
            },
            color: "#000"
          },

          min: (param === "pH") ? 5 : undefined,
          max: (param === "pH") ? 10 : undefined,

          ticks: {
            color: '#000',
            font: {
              size: 14,
              weight: 'bold'
            }
          }
        }
      }
    }
  });

  return;
}
  ///ضبط الوان curves
  function getColorByIndex(i) {
  const colors = [
    "#1f77b4", "#ff7f0e", "#2ca02c",
    "#d62728", "#9467bd", "#8c564b",
    "#e377c2", "#7f7f7f", "#bcbd22"
  ];
  return colors[i % colors.length];
}

  // =========================
  // SINGLE MODE (monthly)
  // =========================
  const values = data.values;
  const labels = data.labels || surveyPointsOrder;

  const length = values.length;

  // =========================
  // LIMIT LINES
  // =========================
  const limitLines = [];

  const minKey = param + "_min";
  const maxKey = param + "_max";

  if (limits[minKey] !== undefined) {
    limitLines.push({
      label: param + " Min",
      data: new Array(length).fill(limits[minKey]),
      borderColor: "red",
      borderWidth: 3,
      borderDash: [6, 6],
      pointRadius: 0,
      fill: false
    });
  }

  if (limits[maxKey] !== undefined) {
    limitLines.push({
      label: param + " Max",
      data: new Array(length).fill(limits[maxKey]),
      borderColor: "red",
      borderWidth: 3,
      borderDash: [6, 6],
      pointRadius: 0,
      fill: false
    });
  }

  // =========================
  // CREATE CHART
  // =========================
  charts[id] = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: label,
          data: values,
          borderColor: color,
          tension: 0.3,
          fill: false,
          borderWidth: 6,
          pointRadius: 7,
          pointHoverRadius: 8,
          pointBorderColor: "#fff",
          pointBorderWidth: 2
        },
        ...limitLines
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      devicePixelRatio: 2,

      plugins: {
        title: {
          display: true,
          text: chartMeta[param]?.title || label,
          font: {
            size: 18,
            weight: "bold"
          },
          color: "#000"
        },
        legend: {
          labels: {
            color: "#000",
            font: {
              size: 14,
              weight: "bold"
            }
          }
        }
      },

      scales: {
        x: {
          ticks: {
            color: '#000',
            font: { size: 14, weight: 'bold' }
          }
        },
        y: {
          title: {
            display: true,
            text: chartMeta[param]?.unit || "",
            font: { size: 14, weight: "bold" },
            color: "#000"
          },
          min: (param === "pH") ? 5 : undefined,
          max: (param === "pH") ? 10 : undefined,
          ticks: {
            color: '#000',
            font: { size: 14, weight: 'bold' }
          }
        }
      }
    }
  });
}
// =========================
// GENERATE DASHBOARD
// =========================
function generateDashboard() {
  if(!waterData || waterData.length===0) {
    alert("Loading data... try again");
    return;
  }

  const type = window.dashboardFilters.type;

  if(type==="survey") generateSurvey();
  else generateMonthly();
}

function generateMonthly() {
  const filtered = getFilteredData();
  resetMonthly();

  filtered.forEach(r=>{
    const date = r[1];
    push("turbidity", date, r[8]);
    push("pH", date, r[9]);
    push("temp", date, r[10]);
    push("tds", date, r[11]);
    push("ch", date, r[12]);
    push("sulf", date, r[13]);
    push("fe", date, r[14]);
    push("mn", date, r[15]);
    push("nh3", date, r[16]);
    push("no2", date, r[17]);
    push("no3", date, r[18]);    
    push("do", date, r[19]);
    push("cod", date, r[20]);
    push("bod", date, r[21]);
    push("og", date, r[22]);
    push("tc", date, r[23]);
    push("ta", date, r[24]);
  });

  draw("turbidityChart","Turbidity",build("turbidity"),"blue","turbidity");
  draw("phChart","pH",build("pH"),"blue","pH");
  draw("tempChart","Temp",build("temp"),"blue","temp");
  draw("tdsChart","TDS",build("tds"),"blue","tds");
  draw("chChart","Chlorides",build("ch"),"blue","ch");
  draw("sulfChart","Sulfates",build("sulf"),"blue","sulf");
  draw("feChart","Fe",build("fe"),"blue","fe");
  draw("mnChart","Mn",build("mn"),"blue","mn");
  draw("nh3Chart","NH3",build("nh3"),"blue","nh3");
  draw("no2Chart","NO2",build("no2"),"blue","no2");
  draw("no3Chart","NO3",build("no3"),"blue","no3"); 
  draw("doChart","DO",build("do"),"blue","do");
  draw("codChart","COD",build("cod"),"blue","cod");
  draw("bodChart","BOD",build("bod"),"blue","bod");
  draw("ogChart","Oil & Grease",build("og"),"blue","og");
  draw("tcChart","Total Coliform",build("tc"),"blue","tc");
  draw("taChart","Total Algae",build("ta"),"blue","ta");
}

function generateSurvey() {

  const filtered = getFilteredData();

  const groupedMap = buildSurveyMap(filtered);

  draw("turbidityChart","Turbidity",
    buildSurveySeries(groupedMap, 8),
    "blue","turbidity"
  );

  draw("phChart","pH",
    buildSurveySeries(groupedMap, 9),
    "blue","pH"
  );

  draw("tempChart","Temp",
    buildSurveySeries(groupedMap, 10),
    "blue","temp"
  );

  draw("tdsChart","TDS",
    buildSurveySeries(groupedMap, 11),
    "blue","tds"
  );
  draw("chChart","ch",
    buildSurveySeries(groupedMap, 12),
    "blue","ch"
  );
  draw("sulfChart","sulf",
    buildSurveySeries(groupedMap, 13),
    "blue","sulf"
  );
  draw("feChart","fe",
    buildSurveySeries(groupedMap, 14),
    "blue","fe"
  );
  draw("mnChart","mn",
    buildSurveySeries(groupedMap, 15),
    "blue","mn"
  );
  draw("nh3Chart","nh3",
    buildSurveySeries(groupedMap, 16),
    "blue","nh3"
  );
  draw("no2Chart","no2",
    buildSurveySeries(groupedMap, 17),
    "blue","no2"
  );
  draw("no3Chart","no3",
    buildSurveySeries(groupedMap, 18),
    "blue","no3"
  );
  draw("doChart","DO",
    buildSurveySeries(groupedMap, 19),
    "blue","do"
  );
   draw("codChart","COD",
    buildSurveySeries(groupedMap, 20),
    "blue","cod"
  );
   draw("bodChart","BOD",
    buildSurveySeries(groupedMap, 21),
    "blue","bod"
  );
   draw("ogChart","og",
    buildSurveySeries(groupedMap, 22),
    "blue","og"
  );
   draw("tcChart","tc",
    buildSurveySeries(groupedMap, 23),
    "blue","tc"
  );
   draw("taChart","ta",
    buildSurveySeries(groupedMap, 24),
    "blue","ta"
  );
  
}
function clean(str){
  return (str || "").toString().trim();
}
// =========================
// ON PAGE LOAD
// =========================
window.onload = async ()=>{
  const filters = JSON.parse(sessionStorage.getItem("dashboardFilters"));
  if(!filters) { alert("No filters selected"); return; }
  window.dashboardFilters = filters;
  await loadWaterData();
 
};
    

</script>
