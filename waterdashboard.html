<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Water Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="waterdash.css">

</head>

<body>

<h2 style="text-align:center;">Water Monitoring Dashboard</h2>

<div class="dashboard-grid">
  <canvas id="turbidityChart"></canvas>
  <canvas id="phChart"></canvas>
  <canvas id="tempChart"></canvas>
  <canvas id="tdsChart"></canvas>
  <canvas id="doChart"></canvas>
  <canvas id="codChart"></canvas>
  <canvas id="bodChart"></canvas>
</div>



</body>
</html>
<script>
// =========================
// GLOBAL STORAGE
// =========================
let charts = {};
let waterData = [];  // يجب تحميلها من المصدر
const monthlyStats = {};
const surveyPointsOrder = [
  "اعلى التيار 3000 م",
  "اعلى التيار 2500 م",
  "اعلى التيار 2000 م",
  "اعلى التيار 1500 م",
  "اعلى التيار 1000 م",
  "اعلى التيار 500 م",
  "المأخذ",
  "اسفل التيار 500 م",
  "اسفل التيار 1000 م"
];

// =========================
// LOAD DATA (EXAMPLE)
// =========================
async function loadWaterData() {

  const email = sessionStorage.getItem("email");
  const department = sessionStorage.getItem("department");

  if (!email || !department) {
    alert("Session expired, please login again");
    window.location.href = "index.html";
    return;
  }

  const url = `https://script.google.com/macros/s/AKfycbzxkrJQQ6mArsWsFhpMtG19zpUXHudAg9nGR-wO4Tf_8XrzVdiD_68dEdkXYksUJHfY_A/exec?action=getData&email=${encodeURIComponent(email)}&department=${encodeURIComponent(department)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    console.log("DATA:", data);

    if (data.status === "success") {
      waterData = data.water_data; // مهم جدًا
      generateDashboard(); // تشغيل الداشبورد بعد تحميل البيانات
    } else {
      alert("Unauthorized or invalid request");
    }

  } catch (err) {
    console.error(err);
    alert("فشل الاتصال بالبيانات");
  }
}
// =========================
// FILTER DATA
// =========================
function getFilteredData() {
  const { branch, station, from, to, type } = window.dashboardFilters;

  let fromDate = from ? new Date(from) : null;
  let toDate = to ? new Date(to) : null;
  if (toDate) toDate.setHours(23,59,59,999);

  return waterData.filter(r => {
    const d = new Date(r[1]);
    const b = r[2];
    const s = r[3];
    const point = r[4];

    // 👇 هنا الحل
    

    if (branch && b !== branch) return false;
    if (station && s !== station) return false;
    if (fromDate && d < fromDate) return false;
    if (toDate && d > toDate) return false;

    return true;
  });
}
// =========================
// MONTHLY PROCESSING
// =========================
function resetMonthly() { Object.keys(monthlyStats).forEach(k => delete monthlyStats[k]); }
function monthKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function push(ind, date, val) {
  if(val==="" || val==null) return;
  const v = Number(val);
  if(isNaN(v)) return;
  const m = monthKey(date);
  if(!monthlyStats[ind]) monthlyStats[ind] = {};
  if(!monthlyStats[ind][m]) monthlyStats[ind][m] = [];
  monthlyStats[ind][m].push(v);
}
function build(ind) {
  const data = monthlyStats[ind] || {};
  const labels = Object.keys(data).sort();
  const values = labels.map(m => {
    const arr = data[m];
    return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2);
  });
  return { labels, values };
}

// =========================
// SURVEY PROCESSING
// =========================
function normalize(str){
  return (str || "")
    .toString()
    .trim()
    .replace(/\s+/g,' ')
    .replace(/\u200f|\u200e/g,''); // removes hidden RTL/LTR marks
}

// =========================
// BUILD GROUPS ONCE
// =========================
function buildSurveyMap(data) {

  const map = {};

  const normalizedPoints = surveyPointsOrder.map(normalize);

  data.forEach(r => {

    const point = normalize(r[4]);

    const idx = normalizedPoints.indexOf(point);
    if (idx === -1) return;

    const key = surveyPointsOrder[idx];

    const surveyId = r[1]; // التاريخ

    const val = Number(r[8]); // مش ضروري هنا بس للتوضيح

    if (isNaN(val)) return;

    if (!map[key]) {
      map[key] = {};
    }

    if (!map[key][surveyId]) {
      map[key][surveyId] = [];
    }

    map[key][surveyId].push(r);
  });

  return map;
}

// =========================
// BUILD SERIES
// =========================
function buildSurveySeries(groupedMap, index) {

  const surveyMap = {};

  const normalizedPoints = surveyPointsOrder.map(normalize);

  // =========================
  // GROUP BY DATE + POINT
  // =========================
  Object.keys(groupedMap).forEach(point => {

    const rows = groupedMap[point];

    rows.forEach(r => {

      const date = r[1]; // 👈 المسح البيئي

      const idx = normalizedPoints.indexOf(normalize(r[4]));
      if (idx === -1) return;

      const keyPoint = surveyPointsOrder[idx];
      const val = Number(r[index]);

      if (isNaN(val)) return;

      if (!surveyMap[date]) surveyMap[date] = {};
      if (!surveyMap[date][keyPoint]) surveyMap[date][keyPoint] = [];

      surveyMap[date][keyPoint].push(val);
    });
  });

  // =========================
  // CONVERT TO SERIES
  // =========================
  const datasets = [];

  Object.keys(surveyMap).forEach(date => {

    const values = surveyPointsOrder.map(p => {

      const arr = surveyMap[date][p] || [];
      if (!arr.length) return null;

      return +(
        arr.reduce((a,b)=>a+b,0) / arr.length
      ).toFixed(2);
    });

    datasets.push({
      label: date,
      data: values
    });

  });

  return datasets;
}
  //============
  //الحدود
  //============
const limits = {
  pH_min: 6.5,  pH_max: 8.5,
  tds_max: 500,
  sulf_max: 200,
  fe_max: 0.5,
  mn_max: 0.2,
  nh3_max: 0.5,
  no3_max: 2,
  do_min: 6,
  cod_max: 10,
  bod_max: 6,
  og_max: 0.1
};
// =========================
// DRAW CHART
// =========================
function draw(id, label, data, color, param) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext("2d");

  if (charts[id]) charts[id].destroy();
  const isArray = Array.isArray(data);

const isMulti = Array.isArray(data) && data[0]?.data;

if (isMulti) {
  // multi survey mode
  charts[id] = new Chart(ctx, {
    type: "line",
    data: {
      labels: surveyPointsOrder,
      datasets: data.map((ds, i) => ({
        label: ds.label,
        data: ds.data,
        borderColor: i === 0 ? color : getRandomColor(i),
        tension: 0.3,
        fill: false,
        borderWidth: 4,
        pointRadius: 5
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

  return;
}
  const labels = isArray ? surveyPointsOrder : data.labels;

  let values = [];
  let labels = surveyPointsOrder;
  
  if (!isMulti) {
    values = data.values;
  }

  const length = values.length;
  // =========================
  // BUILD LIMIT LINES
  // =========================
  const limitLines = [];

  const minKey = param + "_min";
  const maxKey = param + "_max";

  if (limits[minKey] !== undefined) {
    limitLines.push({
      label: param + " Min",
      data: new Array(length).fill(limits[minKey]),
      borderColor: "green",
      borderWidth: 2,
      borderDash: [6, 6],
      pointRadius: 0,
      fill: false
    });
  }

  if (limits[maxKey] !== undefined) {
    limitLines.push({
      label: param + " Max",
      data: new Array(length).fill(limits[maxKey]),
      borderColor: "red",
      borderWidth: 2,
      borderDash: [6, 6],
      pointRadius: 0,
      fill: false
    });
  }

  // =========================
  // CREATE CHART
  // =========================
  charts[id] = new Chart(ctx, {
    type: "line",
    data: {
      labels: data.labels || surveyPointsOrder,
      datasets: [
        {
          label: label,
          data: values,
          borderColor: color,
          tension: 0.3,
          fill: false,
          borderWidth: 6,
          pointRadius: 7,
          pointHoverRadius: 8,
          pointBorderColor: "#fff",
          pointBorderWidth: 2
        },
        ...limitLines // 🔥 إضافة خطوط الـ limits
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      devicePixelRatio: 2,

      plugins: {
        legend: {
          labels: {
            color: '#000',
            font: {
              size: 16,
              weight: 'bold'
            }
          }
        }
      },

      scales: {
        x: {
          ticks: {
            color: '#000',
            font: {
              size: 14,
              weight: 'bold'
            }
          },
          grid: {
            color: '#cccccc',
            lineWidth: 1.2
          }
        },
        y: {
           min: (param === "pH") ? 5 : undefined,
           max: (param === "pH") ? 10 : undefined,
           max: (param === "TDS") ? 1000 : undefined,
          ticks: {
            color: '#000',
            font: {
              size: 14,
              weight: 'bold'
            }
          },
          grid: {
            color: '#cccccc',
            lineWidth: 1.2
          }
        }
      }
    }
  });
}
// =========================
// GENERATE DASHBOARD
// =========================
function generateDashboard() {
  if(!waterData || waterData.length===0) {
    alert("Loading data... try again");
    return;
  }

  const type = window.dashboardFilters.type;

  if(type==="survey") generateSurvey();
  else generateMonthly();
}

function generateMonthly() {
  const filtered = getFilteredData();
  resetMonthly();

  filtered.forEach(r=>{
    const date = r[1];
    push("Turbidity", date, r[8]);
    push("pH", date, r[9]);
    push("Temp", date, r[10]);
    push("TDS", date, r[11]);
    push("DO", date, r[19]);
    push("COD", date, r[20]);
    push("BOD", date, r[21]);
  });

  draw("turbidityChart","Turbidity",build("Turbidity"),"blue","turbidity");
  draw("phChart","pH",build("pH"),"blue","pH");
  draw("tempChart","Temp",build("Temp"),"blue","temp");
  draw("tdsChart","TDS",build("TDS"),"blue","tds");
  draw("doChart","DO",build("DO"),"blue","do");
  draw("codChart","COD",build("COD"),"blue","cod");
  draw("bodChart","BOD",build("BOD"),"blue","bod");
}

function generateSurvey() {

  const filtered = getFilteredData();

  const groupedMap = buildSurveyMap(filtered);

  draw("turbidityChart","Turbidity",
    buildSurveySeries(groupedMap, 8),
    "blue","turbidity"
  );

  draw("phChart","pH",
    buildSurveySeries(groupedMap, 9),
    "blue","pH"
  );

  draw("tempChart","Temp",
    buildSurveySeries(groupedMap, 10),
    "blue","temp"
  );

  draw("tdsChart","TDS",
    buildSurveySeries(groupedMap, 11),
    "blue","tds"
  );

  draw("doChart","DO",
    buildSurveySeries(groupedMap, 18),
    "blue","do"
  );
}
function clean(str){
  return (str || "").toString().trim();
}
// =========================
// ON PAGE LOAD
// =========================
window.onload = async ()=>{
  const filters = JSON.parse(sessionStorage.getItem("dashboardFilters"));
  if(!filters) { alert("No filters selected"); return; }
  window.dashboardFilters = filters;
  await loadWaterData();
 
};
    

</script>
