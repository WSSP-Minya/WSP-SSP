<!DOCTYPE html>
<html>
    <title>main page</title>
    
    <head>
        <link rel="stylesheet" href="mainpage.css">
    </head>
    <body>
        <!-- زر Logout -->
        <div class="topbar">
            <!-- الجزء الخاص بالأزرار في أقصى اليسار -->
            <div class="left-side">
                <button class="logout-button" onclick="logout()">Logout</button>
                <button class="changepassword-button" onclick="AccessedToPage('changepassword')">
                    <img src="change password.webp" alt="Change password" title="Change password">
                    
                </button>
                <button class="add-user-button" onclick="openAddUserPopup()"> <!-- زر إضافة مستخدم -->
                    <img src="users settings.webp" alt="add and remove user" title="Add and Remove user">
                </button>
            </div>

            <!-- الجزء الخاص بالـ logo و user info في أقصى اليمين -->
            <div class="right-side">
                <div class="userinfo">
                    <label>Section</label>
                    <input id="section" disabled>
                </div>
                <img class="logo" src="wsp.22cd4e849308ae80b006.png">
            </div>
        </div>
        <!--نافذه منشقة داخل الصفحة لادخال new user-->
        <div id="addUserPopup" class="popup">
            <div class="popup-content">
                <span class="close-btn" onclick="closeAddUserPopup()">&times;</span>
                <h2>Add and Remove User</h2>
                <form id="addUserForm" onsubmit="submitUserForm(event)">            
                    <select id="branch">
                        <option value="" selected disabled>Select Branch</option>
                         <option value="WSP">WSP</option>
                         <option value="التوعية">التوعية</option>
                         <option value="التشغيل والصيانة جنوب">التشغيل والصيانة جنوب</option>
                        <option value="المشروعات">المشروعات</option>
                        <option value="العدوه">العدوه</option>
                        <option value="مغاغة">مغاغة</option>
                        <option value="بنى مزار">بنى مزار</option>
                        <option value="مطاى">مطاى</option>
                        <option value="سمالوط">سمالوط</option>
                        <option value="المنيا">المنيا</option>
                        <option value="ابوقرقاص">ابوقرقاص</option>
                        <option value="ملوى">ملوى</option>
                        <option value="ديرمواس">ديرمواس</option>
                    </select>
                     <select id="userSelect">
                        <option value="" selected disabled>Select User</option>
                        <option value="__new__">Add New User</option>
                    </select>
                    <input type="email" id="email" placeholder="User Email">
                    <input type="password" id="password" placeholder="Password">
                   
                   
                    <select id="role" required>
                        <option value="user">user</option>
                        <option value="Admin">Admin</option>
                    </select>
                    <input type="tel" id="phone" placeholder="Phone Number" pattern="^\+?[0-9]{10,15}$">
                    <input type="number" id="apikey" placeholder="apiKey">
                    <div class = "control-button"> 
                        <button type="submit">Add</button>
                        <button type="button" onclick="deleteUserFromPopup()">Remove</button>
                    </div>

                </form>
                <div id="errorMessage" style="color: red; text-align: center;"></div>
            </div>
        </div>


               
        <div class="options">
            <button onclick="AccessedToPage('waterqualitymonitoring')" class="buttonlabel">
                
                <img src="water-setization-image.webp" alt="Water Quality Monitoring" title="Raw Water Quality Monitoring">
                <span>Raw Water Monitoring</span>
            </button>
            
            <button onclick="AccessedToPage('correctiveactions')" class="buttonlabel">
                <img src="https://i0.wp.com/hellonimbly.com/wp-content/uploads/2022/09/BLOG-Social-Media_September_5-Important-Benefits-of-Corrective-Action-Report-in-Business.jpg?fit=1281%2C721&ssl=1" alt="Corrective Actions" title="Corrective Actions">
                <span>Corrective Actions</span>
            </button> 

            <button onclick="AccessedToPage('reports')" class="buttonlabel">
                <img src="business-report.webp" alt="Reports" title="Reports">
                <span>Reports</span>
            </button> 
          
        </div>
        <script>
            
            const scriptURL = "https://script.google.com/macros/s/AKfycbxgWdY2wNKaWyzIuTRqXD0eHKA5Q0j2fSNGoBjGzAJLDwSysJn1v1kef3jSQCrl27N31w/exec";
            const department = sessionStorage.getItem("department");
            document.getElementById("section").value = department || "";
            function AccessedToPage(pagename){
                
                window.location.href= pagename+".html";
            }
        const buttons = document.querySelectorAll(".buttonlabel");
        const waterMonitoringButton = buttons[0];
        const reportsButton = buttons[2];      
        const dep = department?.trim().toLowerCase();
        
        const reportsAllowed = [
            "wsp",
            "التوعية",
            "التشغيل والصيانة جنوب",
            "المشروعات"
        ];
        
        const waterMonitoringBlocked = [
            "التوعية",
            "التشغيل والصيانة جنوب",
            "المشروعات"
        ];
        
        // تعطيل Water Monitoring للتوعية والتشغيل والصيانة جنوب فقط
        if (waterMonitoringBlocked.includes(dep)) {
            waterMonitoringButton.disabled = true;
            waterMonitoringButton.style.opacity = "0.5";
            waterMonitoringButton.style.pointerEvents = "none";
        }
        
        // تعطيل Reports لأي قسم غير مسموح له
        if (!reportsAllowed.includes(dep)) {
            reportsButton.disabled = true;
            reportsButton.style.opacity = "0.5";
            reportsButton.style.pointerEvents = "none";
        }
            // ================= Users Management =================

          let usersData = [];
          document.getElementById("email").style.display = "none";
          
          // تحميل المستخدمين عند اختيار الفرع
          document.getElementById("branch").addEventListener("change", () => {
          
              const branch =
                  document.getElementById("branch").value;
          
              if (!branch) return;
          
              fetchUsers(branch);
          
          });
          
          
          // جلب المستخدمين
          function fetchUsers(branch) {
          
              const userSelect =
                  document.getElementById("userSelect");
          
              userSelect.innerHTML = `
                  <option value="" selected disabled>
                      Loading Users...
                  </option>
              `;
          
              fetch(scriptURL, {
                  method: "POST",
                  headers: {
                      "Content-Type":
                      "application/x-www-form-urlencoded"
                  },
                  body: new URLSearchParams({
                      action: "getUsersByBranch",
                      department: branch
                  })
              })
              .then(res => res.json())
              .then(data => {
          
                  userSelect.innerHTML = `
                      <option value="" selected disabled>
                          Select User
                      </option>
          
                      <option value="__new__">
                          Add New User
                      </option>
                  `;
          
                  usersData = data.users || [];
          
                  usersData.forEach(user => {
          
                      const option =
                          document.createElement("option");
          
                      option.value = user.email;
          
                      option.textContent =
                          `${user.email}`;
          
                      userSelect.appendChild(option);
          
                  });
          
              })
              .catch(err => {
                  console.error(err);
                  alert("Error Loading Users");
              });
          }
          
          // عند اختيار مستخدم
          document.getElementById("userSelect")
          .addEventListener("change", () => {
          
              const selected =
                  document.getElementById("userSelect").value;
          
              // إظهار أو إخفاء email بشكل صحيح
              const emailInput = document.getElementById("email");
          
              if (selected === "__new__") {
                  emailInput.style.display = "block";
              } else {
                  emailInput.style.display = "none"; 
                  // أو none لو عايز تخفيه في وضع التعديل
              }
          
              // إضافة مستخدم جديد
              if (selected === "__new__") {
          
                  document.getElementById("email").value = "";
                  document.getElementById("password").value = "";
                  document.getElementById("phone").value = "";
                  document.getElementById("apikey").value = "";
                  document.getElementById("role").value = "user";
                  
          
                  document.getElementById("email")
                  .removeAttribute("readonly");
          
                  return;
              }
          
              const user =
                  usersData.find(
                      u => u.email === selected
                  );
          
              if (!user) return;
          
              document.getElementById("email").value =
                  user.email || "";
          
              document.getElementById("password").value =
                  user.password || "";
          
              document.getElementById("phone").value =
                  user.phone || "";
          
              document.getElementById("apikey").value =
                  user.apikey || "";
          
              document.getElementById("role").value =
                  user.role || "user";
          
              document.getElementById("email")
              .setAttribute("readonly", true);
          
          });
        
             // فتح نافذة إضافة مستخدم
            function openAddUserPopup() {
                const userRole = sessionStorage.getItem("role");
                if (userRole !== "Admin") {
                    console.log("User Role:", userRole)

                    alert("Only admin can add users.");
                    return;
                }
                document.getElementById("addUserPopup").style.display = "flex";
            }

            // غلق نافذة إضافة مستخدم
            function closeAddUserPopup() {
                document.getElementById("addUserPopup").style.display = "none";
            }

            // معالجة إرسال نموذج إضافة المستخدم
            function submitUserForm(event) {
                event.preventDefault();
            
                const newEmail = document.getElementById("email").value;  // البريد الإلكتروني الجديد
                const password = document.getElementById("password").value;
                const department = document.getElementById("branch").value;
                const userRole = document.getElementById("role").value;
                const phone = document.getElementById("phone").value;
                const apikey = document.getElementById("apikey").value;
                console.log("User Role:", userRole);
            
                fetch(scriptURL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        action: "addUser",
                        adminEmail: sessionStorage.getItem("email"),
                        email: newEmail,          // ✅ الاسم الصحيح
                        password: password,
                        role: userRole,
                        department: department,
                        phone: phone,
                        apikey: apikey
                    })
                })
                .then(res => res.json())
                .then(data => {
                    console.log(data);
                    alert(data.message);
                    if (data.status === "success") {
                        document.getElementById("addUserForm").reset; // ✅ مسح الفورم
                    }
                })
                .catch(err => alert(err.message));

            }
             // معالجة إرسال نموذج إضافة المستخدم
            function submitUserForm(event) {

                event.preventDefault();
            
                const selectedUser =
                    document.getElementById("userSelect").value;
            
                const action =
                    selectedUser &&
                    selectedUser !== "__new__"
                    ? "updateUser"
                    : "addUser";
            
                fetch(scriptURL, {
                    method: "POST",
                    headers: {
                        "Content-Type":
                        "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
            
                        action: action,
            
                        adminEmail:
                            sessionStorage.getItem("email"),
            
                        email:
                            document.getElementById("email").value,
            
                        password:
                            document.getElementById("password").value,
            
                        role:
                            document.getElementById("role").value,
            
                        department:
                            document.getElementById("branch").value,
            
                        phone:
                            document.getElementById("phone").value,
            
                        apikey:
                            document.getElementById("apikey").value
            
                    })
                })
                .then(res => res.json())
                .then(data => {
            
                    alert(data.message);
            
                    if (data.status === "success") {
            
                        document.getElementById("addUserForm").reset();
            
                        document.getElementById("userSelect")
                        .innerHTML = `
                            <option value="" selected disabled>
                                Select User
                            </option>
                            <option value="__new__">
                                Add New User
                            </option>
                        `;
            
                        const branch =
                            document.getElementById("branch").value;
            
                        if (branch)
                            fetchUsers(branch);
                    }
            
                })
                .catch(err => alert(err.message));
            
            }


            // فتح نافذة حذف مستخدم
            function openDeleteUserPopup() {
                const userRole = sessionStorage.getItem("role");
                if (userRole !== "admin") {
                    alert("Only admin can delete users.");
                    return;
                }
                document.getElementById("deleteUserPopup").style.display = "flex";
            }

            // غلق نافذة حذف مستخدم
            function closeDeleteUserPopup() {
                document.getElementById("deleteUserPopup").style.display = "none";
            }

            // معالجة إرسال نموذج حذف المستخدم
            function deleteUserFromPopup() {
              
                  const email = document.getElementById("userSelect").value;
              
                  if (!email) {
                      alert("من فضلك أختار البريد الإلكتروني أولاً");
                      return;
                  }              
                  if (!confirm(`؟ هل أنت متأكد من حذف المستخدم:\n${email}`)) return;

              
                  fetch(scriptURL, {
                      method: "POST",
                      headers: {
                          "Content-Type":
                          "application/x-www-form-urlencoded"
                      },
                      body: new URLSearchParams({
                          action: "deleteUser",
                          adminEmail:
                              sessionStorage.getItem("email"),
                          email: email              
                      })
                  })
                  .then(res => res.json())
                  .then(data => {              
                      alert(data.message);              
                      if (data.status === "success") {             
                          document.getElementById("addUserForm").reset();
              
                          const branch = document.getElementById("branch").value;
              
                          if (branch)
                              fetchUsers(branch);
                      }          
                  })
                  .catch(err => alert(err.message));         
              }
            //  تسجيل الخروج
            function logout() {
                sessionStorage.clear(); // مسح بيانات الجلسة
                alert("You have been logged out");
                window.location.href = "index.html"; // إعادة توجيه لصفحة تسجيل الدخول
            }
  


        </script>
    </body>






</html>
